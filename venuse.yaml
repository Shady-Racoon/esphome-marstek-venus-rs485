substitutions:
  mqtt_server: "10.10.10.10" # mqtt broker IP
  topic_grid_power: "/Hichi/Power" # (grid power > 0 -> battery will discharge; grid power < 0 -> battery will charge)

esphome:
  name: venuse
  friendly_name: VenusE

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: INFO

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

mqtt:
  broker: ${mqtt_server}
  username:  !secret mqtt_username
  password:  !secret mqtt_password

globals:
  - id: last_mqtt_update
    type: uint32_t
    restore_value: no
    initial_value: '0'

  - id: last_abs_power
    type: int
    restore_value: no
    initial_value: '0'

  - id: last_power_setpoint
    type: float
    restore_value: no
    initial_value: '0'

web_server:
  port: 80
  version: 3
  include_internal: False
  local: True
  sorting_groups:
    - id: Info
      name: "Info"
      sorting_weight: -50
    - id: AutoMode
      name: "Auto Mode"
      sorting_weight: -49
    - id: AdvControl
      name: "Adv. Control"
      sorting_weight: -45
    - id: Diagnostic
      name: "Diagnostic"
      sorting_weight: 50
    - id: Maintenance
      name: "Maintenance"
      sorting_weight: 51

uart:
  - id: mod_bus
    rx_pin: GPIO16
    tx_pin: GPIO17
    baud_rate: 115200
    data_bits: 8
    stop_bits: 1
    parity: NONE

modbus:
  - uart_id: mod_bus
    id: modbus1
    send_wait_time: 30ms

modbus_controller:
  - id: mt
    address: 0x1
    modbus_id: modbus1
    command_throttle: 30ms
    update_interval: 1s

button:
  - platform: template
    name: "Reset Device"
    icon: "mdi:restart"
    entity_category: config
    disabled_by_default: true
    on_press:
      then:
        - lambda: |-
            modbus_controller::ModbusController *controller = id(mt);
            modbus_controller::ModbusCommandItem resetfilter = modbus_controller::ModbusCommandItem::create_write_single_command(controller, 41000, 21930);
            controller->queue_command(resetfilter);
    web_server:
      sorting_group_id: Maintenance
      sorting_weight: -68

  # UNTESTED!!!
  - platform: template
    name: "Factory Reset"
    icon: "mdi:factory"
    entity_category: config
    disabled_by_default: true
    on_press:
      then:
        - lambda: |-
            modbus_controller::ModbusController *controller = id(mt);
            modbus_controller::ModbusCommandItem resetfilter = modbus_controller::ModbusCommandItem::create_write_single_command(controller, 41001, 21930);
            controller->queue_command(resetfilter);
    web_server:
      sorting_group_id: Maintenance
      sorting_weight: -67

text_sensor:
  - platform: template
    name: "Inverter State"
    lambda: |-
      switch (int(id(inverter_state).state)) {
        case 0: return std::string("Sleep");
        case 1: return std::string("Standby");
        case 2: return std::string("Charge");
        case 3: return std::string("Discharge");
        case 4: return std::string("Fault");
        case 5: return std::string("Idle");
        case 6: return std::string("AC bypass");
        default: return std::string("Unknown");
      };
    update_interval: 5s
    web_server:
      sorting_group_id: Info
      sorting_weight: -99

  - platform: modbus_controller
    id: power_restriction_discharge
    name: "Power restriction"
    modbus_controller_id: mt
    register_type: holding
    address: 41010
    raw_encode: NONE
    icon: mdi:home-heart
    entity_category: diagnostic
    skip_updates: 60
    lambda: |-
      uint16_t int_mode = (data[item->offset] << 8) + data[item->offset+1];
      ESP_LOGD("main","Parsed operation mode int : %d", int_mode);
      std::string mode_str;
      switch (int_mode) {
        case 0:  mode_str = "Off"; break;
        case 1:  mode_str = "800W limited"; break;                                                              
      }
      return mode_str;
    web_server:
      sorting_group_id: Info
      sorting_weight: -89

  - platform: template
    name: "Software Version"
    id: software_version_text
    icon: mdi:factory
    update_interval: never
    entity_category: diagnostic
    web_server:
      sorting_group_id: Diagnostic
      sorting_weight: -71

  - platform: template
    name: "Firmware Version"
    id: firmware_version_text
    icon: mdi:factory
    update_interval: never
    entity_category: diagnostic
    web_server:
      sorting_group_id: Diagnostic
      sorting_weight: -70

  - platform: template
    name: "BMS Version"
    id: bms_version_text
    icon: mdi:factory
    update_interval: never
    entity_category: diagnostic
    web_server:
      sorting_group_id: Diagnostic
      sorting_weight: -69

sensor:
  - platform: modbus_controller
    id: inverter_state
    icon: mdi:state-machine
    modbus_controller_id: mt
    register_type: holding
    address: 35100
    value_type: U_WORD
    internal: true

  - name: "State Of Charge"
    id: "battery_state_of_charge"
    platform: modbus_controller
    device_class: battery
    state_class: measurement
    modbus_controller_id: mt
    register_type: holding
    address: 32104
    value_type: U_WORD
    unit_of_measurement: "%"
    accuracy_decimals: 0
    web_server:
      sorting_group_id: Info
      sorting_weight: -99

  - platform: template
    name: "Inverter Efficiency"
    id: inverter_efficiency
    unit_of_measurement: "%"
    accuracy_decimals: 1
    state_class: measurement
    lambda: |-
      float ac = id(ac_power).state;
      float batt = id(battery_power).state;

      if (isnan(ac) || isnan(batt) || ac == 0) {
        return NAN;
      }

      if (abs(ac) < 50 || abs(batt) < 50) {
        return NAN;
      }

      float eff;

      if (ac < 0) {
        eff = (batt / ac) * 100.0; // Charging -> neg. values
      } 
      else {
        eff = (ac / abs(batt)) * 100.0; // Discharging -> pos. values
      }

      return eff;
    update_interval: 1s
    web_server:
      sorting_group_id: Info
      sorting_weight: -97

  - name: "AC Power"
    id: ac_power
    icon: mdi:flash
    platform: modbus_controller
    modbus_controller_id: mt
    register_type: holding
    address: 32202
    value_type: S_DWORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    web_server:
      sorting_group_id: Info
      sorting_weight: -96

  - name: "Battery Power"
    id: battery_power
    platform: modbus_controller
    modbus_controller_id: mt
    register_type: holding
    address: 32102
    value_type: S_DWORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    web_server:
      sorting_group_id: Info
      sorting_weight: -95

  - name: "Total Charged Energy"
    id: "total_charging_energy"
    icon: mdi:chart-bar
    platform: modbus_controller
    modbus_controller_id: mt
    register_type: holding
    address: 33000
    value_type: U_DWORD
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
    register_count: 2
    web_server:
      sorting_group_id: Info
      sorting_weight: -94

  - name: "Total Discharged Energy"
    id: "total_discharging_energy"
    icon: mdi:chart-bar
    platform: modbus_controller
    modbus_controller_id: mt
    register_type: holding
    address: 33002
    value_type: U_DWORD
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
    register_count: 2
    web_server:
      sorting_group_id: Info
      sorting_weight: -93

  - platform: template
    name: "Remaining Capacity"
    id: "battery_remaining_capacity"
    icon: mdi:battery-arrow-down-outline
    unit_of_measurement: "kWh"
    accuracy_decimals: 2
    update_interval: 300s
    lambda: |-
      if (id(battery_total_energy).has_state() && id(battery_state_of_charge).has_state()) {
        float total_energy = id(battery_total_energy).state;
        float soc = id(battery_state_of_charge).state / 100.0;
        return roundf(total_energy * soc * 100) / 100; // Ensures two decimal places
      }
      return NAN;
    web_server:
      sorting_group_id: Info
      sorting_weight: -92

  - name: "Total Energy"
    id: "battery_total_energy"
    icon: mdi:battery-charging-100
    platform: modbus_controller
    device_class: energy_storage
    state_class: measurement
    modbus_controller_id: mt
    register_type: holding
    address: 32105 
    value_type: U_WORD
    unit_of_measurement: "kWh"
    accuracy_decimals: 3
    filters:
      - multiply: 0.001 # Firmware 148: 0.001 / Firmware 147: 0.01
    skip_updates: 60
    web_server:
      sorting_group_id: Info
      sorting_weight: -91

  - name: "Max Cell Voltage"
    internal: True
    platform: modbus_controller
    icon: mdi:sine-wave
    modbus_controller_id: mt
    register_type: holding
    address: 37007
    value_type: U_WORD
    unit_of_measurement: "V"
    device_class: voltage
    accuracy_decimals: 2
    state_class: measurement
    filters:
      - multiply: 0.001
    id: marstek_max_cell_voltage
    skip_updates: 60

  - name: "Min Cell Voltage"
    internal: True
    platform: modbus_controller
    icon: mdi:sine-wave
    modbus_controller_id: mt
    register_type: holding
    address: 37008
    value_type: U_WORD
    unit_of_measurement: "V"
    device_class: voltage
    accuracy_decimals: 2
    state_class: measurement
    filters:
      - multiply: 0.001
    id: marstek_min_cell_voltage
    skip_updates: 60

  - platform: template
    name: "Cell Voltage Delta"
    icon: mdi:sine-wave
    unit_of_measurement: "V"
    device_class: voltage
    accuracy_decimals: 3
    state_class: measurement
    lambda: |-
      if (isnan(id(marstek_max_cell_voltage).state) || isnan(id(marstek_min_cell_voltage).state)) {
        return NAN;
      }
      return id(marstek_max_cell_voltage).state - id(marstek_min_cell_voltage).state;
    web_server:
      sorting_group_id: Info
      sorting_weight: -90

  - name: "Internal Temperature"
    id: "internal_temperature"
    icon: mdi:thermometer
    platform: modbus_controller
    modbus_controller_id: mt
    register_type: holding
    address: 35000
    value_type: S_WORD
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    skip_updates: 60
    web_server:
      sorting_group_id: Info
      sorting_weight: -88

  - platform: mqtt_subscribe
    name: "Grid Power Raw"
    id: grid_power_raw
    topic: ${topic_grid_power} 
    internal: true
    on_value:
      then:
        - lambda: |-
            id(last_mqtt_update) = millis();

  - platform: template
    name: "Grid Power"
    id: grid_power
    unit_of_measurement: "W"
    update_interval: 1s
    lambda: |-
      if (millis() - id(last_mqtt_update) > 10000) {
        return 0;
      }

      return id(grid_power_raw).state;
    web_server:
      sorting_group_id: AutoMode
      sorting_weight: -86

  - platform: modbus_controller
    id: software_version
    icon: mdi:factory
    modbus_controller_id: mt
    register_type: holding
    address: 31100
    value_type: U_WORD
    accuracy_decimals: 0
    skip_updates: 60
    internal: true
    on_value:
      then:
        - lambda: |-
            int version = (int)x;
            char buf[5];
            sprintf(buf, "V%d", version);
            id(software_version_text).publish_state(buf);

  - platform: modbus_controller
    id: firmware_version
    icon: mdi:factory
    modbus_controller_id: mt
    register_type: holding
    address: 31101
    value_type: U_WORD
    accuracy_decimals: 0
    skip_updates: 60
    internal: true
    on_value:
      then:
        - lambda: |-
            int version = (int)x;
            char buf[5];
            sprintf(buf, "V%d", version);
            id(firmware_version_text).publish_state(buf);

  - platform: modbus_controller
    id: bms_version
    icon: mdi:factory
    modbus_controller_id: mt
    register_type: holding
    address: 31102
    value_type: U_WORD
    accuracy_decimals: 0
    skip_updates: 60
    internal: true
    on_value:
      then:
        - lambda: |-
            int version = (int)x;
            char buf[5];
            sprintf(buf, "V%d", version);
            id(bms_version_text).publish_state(buf);

select:
  - name: "RS485 Control Mode"
    id: "rs485_control_mode"
    icon: mdi:connection
    platform: modbus_controller
    modbus_controller_id: mt
    address: 42000
    value_type: U_WORD
    optionsmap:
      "enable": 21930
      "disable": 21947
    skip_updates: 10
    web_server:
      sorting_group_id: AdvControl
      sorting_weight: -78

  - name: "User Work Mode"
    id: "user_work_mode"
    icon: mdi:auto-mode
    platform: modbus_controller
    modbus_controller_id: mt
    address: 43000
    value_type: U_WORD
    optionsmap:
      "manual": 0
      "anti-feed": 1
      "ai": 2
    skip_updates: 10
    web_server:
      sorting_group_id: AdvControl
      sorting_weight: -77

  - name: "Backup Function"
    id: "backup_function"
    platform: modbus_controller
    modbus_controller_id: mt
    address: 41200
    value_type: U_WORD
    optionsmap:
      "enable": 0
      "disable": 1
    skip_updates: 10
    web_server:
      sorting_group_id: AdvControl
      sorting_weight: -76

  - name: "Set Charge ⁄ Discharge"
    id: "set_chargedischarge"
    platform: modbus_controller
