    platform: modbus_controller
    modbus_controller_id: mt
    register_type: holding
    address: 42020
    value_type: U_WORD
    unit_of_measurement: "W"
    min_value: 0
    max_value: 2500
    step: 1
    skip_updates: 60
    web_server:
      sorting_group_id: AdvControl
      sorting_weight: -73

  - name: "Set Discharge Power"
    id: "set_discharge_power"
    icon: mdi:tune-variant
    mode: box
    platform: modbus_controller
    modbus_controller_id: mt
    register_type: holding
    address: 42021
    value_type: U_WORD
    unit_of_measurement: "W"
    min_value: 0
    max_value: 2500
    step: 1
    skip_updates: 60
    web_server:
      sorting_group_id: AdvControl
      sorting_weight: -72

switch:
  - platform: template
    name: "Automatic mode"
    id: automatic_mode
    icon: mdi:robot
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
    turn_off_action:
      - select.set:
          id: set_chargedischarge
          option: "stop"
      - number.set:
          id: set_charge_power
          value: 0
      - number.set:
          id: set_discharge_power
          value: 0
      - globals.set:
          id: last_power_setpoint
          value: '0'
    web_server:
      sorting_group_id: AutoMode
      sorting_weight: -87
  
script:
  - id: script_set_charge_power
    mode: restart
    then:
      - number.set:
          id: set_charge_power
          value: !lambda 'return id(last_abs_power);'
  
  - id: script_set_discharge_power
    mode: restart
    then:
      - number.set:
          id: set_discharge_power
          value: !lambda 'return id(last_abs_power);'
  
  - id: script_set_mode_charge
    mode: restart
    then:
      - select.set:
          id: set_chargedischarge
          option: "charge"

  - id: script_set_mode_discharge
    mode: restart
    then:
      - select.set:
          id: set_chargedischarge
          option: "discharge"

  - id: script_set_mode_stop
    mode: restart
    then:
      - select.set:
          id: set_chargedischarge
          option: "stop"

  - id: script_enable_rs485
    mode: restart
    then:
      - select.set:
          id: rs485_control_mode
          option: "enable"

interval:
  - interval: 10s
    then:
      - lambda: |-
          
          if (!id(automatic_mode).state) return;
          if (!id(grid_power).has_state()) return;
          if (!id(battery_state_of_charge).has_state()) return;

          if (id(rs485_control_mode).state == "disable") {
            id(script_enable_rs485).execute();
          }

          float grid_curr = id(grid_power).state;
          float soc  = id(battery_state_of_charge).state;
          float curr_setpoint = id(last_power_setpoint);

          if (isnan(curr_setpoint)) {
            curr_setpoint = 0.0;
          }

          float LimitMax_ChargeP = id(max_charge_power).state;
          float LimitMax_DischargeP = id(max_discharge_power).state;
          float LimitMax_SOC = id(charging_cutoff_capacity).state;
          float LimitMin_SOC = id(discharging_cutoff_capacity).state;

          float ChargeStart_MinPwr = id(ChargeStart_MinPwrGrid).state;
          float grid_target = (curr_setpoint > 0)
            ? id(target_grid_charge).state
            : id(target_grid_discharge).state;

          float correction = (grid_curr - grid_target) * 0.5;
          float new_setpoint_calc = curr_setpoint - correction;

          float new_setpoint_final;

          if (curr_setpoint <= 0) {
            if (new_setpoint_calc > 0) {
              if (grid_curr < (-ChargeStart_MinPwr)) {
                new_setpoint_final = new_setpoint_calc;
              } else {
                new_setpoint_final = 0;
              }
            } else {
              new_setpoint_final = new_setpoint_calc;
            }
          } else {
            new_setpoint_final = new_setpoint_calc;
          }

          new_setpoint_final = floor(new_setpoint_final / 50.0) * 50.0;

          if (new_setpoint_final > LimitMax_ChargeP) new_setpoint_final = LimitMax_ChargeP;
          if (new_setpoint_final < -LimitMax_DischargeP) new_setpoint_final = -LimitMax_DischargeP;

          if (new_setpoint_final > 0 && soc >= LimitMax_SOC) new_setpoint_final = 0;
          if (new_setpoint_final < 0 && soc <= LimitMin_SOC)  new_setpoint_final = 0;

          if (fabs(new_setpoint_final - curr_setpoint) < 50) {
            return;
          }

          id(last_power_setpoint) = new_setpoint_final;
          id(last_abs_power) = abs((int)new_setpoint_final);

          if (new_setpoint_final > 10) {
            id(script_set_charge_power).execute();
            id(script_set_mode_charge).execute();
          } else if (new_setpoint_final < -10) {
            id(script_set_discharge_power).execute();
            id(script_set_mode_discharge).execute();
          } else {
            id(script_set_mode_stop).execute();
            id(script_set_charge_power).execute();
            id(script_set_discharge_power).execute();
          }
