    name: "Target Grid (Charging)"
    id: target_grid_charge
    min_value: -1000
    max_value: 0
    step: 10
    initial_value: -100
    unit_of_measurement: "W"
    optimistic: True
    web_server:
      sorting_group_id: AutoMode
      sorting_weight: -85

  - platform: template
    name: "Target Grid (Discharging)"
    id: target_grid_discharge
    min_value: 0
    max_value: 1000
    step: 10
    initial_value: 50
    unit_of_measurement: "W"
    optimistic: True
    web_server:
      sorting_group_id: AutoMode
      sorting_weight: -84

  - platform: template
    name: "Min Grid Power for Charging"
    id: ChargeStart_MinPwrGrid
    min_value: 0
    max_value: 2000
    step: 50
    initial_value: 400
    unit_of_measurement: "W"
    optimistic: True
    web_server:
      sorting_group_id: AutoMode
      sorting_weight: -83

  - name: "Max Charge Power"
    id: "max_charge_power"
